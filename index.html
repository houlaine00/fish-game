<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>深海霸主 Pro</title>
<style>
*{margin:0;padding:0;touch-action:none;user-select:none}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
canvas{display:block;position:fixed;top:0;left:0}
#menu{position:fixed;inset:0;background:linear-gradient(180deg,#0a1628,#1a659f);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100}
#menu h1{font-size:42px;color:#feca57;margin-bottom:15px;text-shadow:0 0 20px rgba(254,202,87,.5)}
#menu p{color:rgba(255,255,255,.6);margin-bottom:25px;font-size:14px;text-align:center}
.btn{padding:16px 60px;background:linear-gradient(90deg,#ff6b6b,#feca57);border:none;border-radius:25px;color:#fff;font-size:18px;cursor:pointer;font-weight:bold}
#hud{position:fixed;top:10px;left:10px;right:10px;display:flex;justify-content:space-between;color:#fff;font-size:16px;z-index:10;pointer-events:none;text-shadow:0 1px 4px #000}
#bb{position:fixed;bottom:90px;right:25px;width:85px;height:85px;background:radial-gradient(circle,#ff6b6b,#c0392b);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;z-index:20;cursor:pointer;border:3px solid rgba(255,255,255,.3);box-shadow:0 5px 20px rgba(231,76,60,.5)}
#bb:active{transform:scale(.9)}
#joy{position:fixed;width:110px;height:110px;background:rgba(255,255,255,.15);border-radius:50%;border:2px solid rgba(255,255,255,.25);display:none;z-index:20;pointer-events:none}
#jk{position:absolute;width:44px;height:44px;background:rgba(255,255,255,.4);border-radius:50%;top:33px;left:33px}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="menu">
<h1>🌊 深海霸主 Pro</h1>
<p>拖动屏幕移动 · 点击🦷撕咬吃鱼<br>10阶进化 · 7大关卡 · BOSS战</p>
<button class="btn" id="start">开始游戏</button>
</div>
<div id="hud">
<div>💰 <span id="sc">0</span></div>
<div>🐟 Lv.<span id="lv">1</span></div>
</div>
<div id="joy"><div id="jk"></div></div>
<div id="bb">🦷</div>

<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
let W,H,P={},mobs=[],run=false,camX=0,camY=0,score=0,eaten=0,lv=1;
let joy={active:false,dx:0,dy:0};

function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight}
window.addEventListener('resize',resize);resize();

const evos=[{n:'小鱼苗',r:18,spd:3},{n:'小金鱼',r:25,spd:3.3},{n:'蓝唐王',r:35,spd:3.5},{n:'河豚',r:48,spd:3.2},{n:'海龟',r:62,spd:2.8},{n:'章鱼',r:78,spd:3.6},{n:'剑鱼',r:95,spd:5},{n:'鲨鱼',r:115,spd:4.2},{n:'鲸鱼',r:140,spd:3.3},{n:'海龙王',r:180,spd:5.5}];

function init(){
const e=evos[0];
P={x:2500,y:2500,r:e.r,ang:0,spd:e.spd,hp:100,bite:15};
camX=P.x-W/2;camY=P.y-H/2;
mobs=[];score=0;eaten=0;lv=1;
for(let i=0;i<20;i++)spawnFish();
}

function spawnFish(){
const colors=['#ff6b6b','#feca57','#48dbfb','#ff9ff3','#54a0ff','#5f27cd','#00d2d3','#ff9f43'];
mobs.push({
x:2000+Math.random()*1000,y:2000+Math.random()*1000,
r:8+Math.random()*14,hp:20+Math.random()*40,
c:colors[Math.floor(Math.random()*colors.length)],
ang:Math.random()*Math.PI*2,spd:0.4+Math.random()*1.2
});
}

cv.addEventListener('touchstart',e=>{
if(!run)return;e.preventDefault();
const t=e.changedTouches[0];
joy.active=true;joy.cx=t.clientX;joy.cy=t.clientY;
const j=document.getElementById('joy');
j.style.display='block';
j.style.left=(t.clientX-55)+'px';
j.style.top=(t.clientY-55)+'px';
},{passive:false});

cv.addEventListener('touchmove',e=>{
e.preventDefault();if(!joy.active)return;
const t=e.changedTouches[0];
let dx=t.clientX-joy.cx,dy=t.clientY-joy.cy,d=Math.hypot(dx,dy);
if(d>38){dx=dx/d*38;dy=dy/d*38}
document.getElementById('jk').style.left=(33+dx)+'px';
document.getElementById('jk').style.top=(33+dy)+'px';
joy.dx=dx/38;joy.dy=dy/38;
},{passive:false});

cv.addEventListener('touchend',e=>{
e.preventDefault();joy.active=false;joy.dx=0;joy.dy=0;
document.getElementById('joy').style.display='none';
},{passive:false});

document.getElementById('bb').addEventListener('touchstart',e=>{e.preventDefault();bite();},{passive:false});
document.getElementById('bb').addEventListener('mousedown',bite);

function bite(){
if(!run)return;
const br=P.r*2.2;
for(let i=mobs.length-1;i>=0;i--){
const m=mobs[i],dist=Math.hypot(m.x-P.x,m.y-P.y);
if(dist<br+m.r){
m.hp-=P.bite;
if(m.hp<=0){
mobs.splice(i,1);
score+=Math.floor(m.r*2);
eaten++;
document.getElementById('sc').textContent=score;
if(eaten%10===0){lv++;P.r=evos[Math.min(lv-1,9)].r;P.spd=evos[Math.min(lv-1,9)].spd;}
document.getElementById('lv').textContent=lv;
if(mobs.length<15)spawnFish();
}
}
}
}

function drawFish(x,y,r,c,ang,isPlayer){
if(x<-150||x>W+150||y<-150||y>H+150)return;
ctx.save();ctx.translate(x,y);ctx.rotate(ang);
ctx.fillStyle=c;
ctx.beginPath();ctx.ellipse(0,0,r,r*0.7,0,0,Math.PI*2);ctx.fill();
const tailWag=Math.sin(Date.now()/200)*5;
ctx.beginPath();ctx.moveTo(-r*0.8,0);
ctx.lineTo(-r*1.5,-r*0.4+tailWag*0.1);ctx.lineTo(-r*1.5,r*0.4+tailWag*0.1);ctx.fill();
ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(r*0.4,-r*0.15,r*0.22,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#000';ctx.beginPath();ctx.arc(r*0.48,-r*0.15,r*0.1,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(r*0.52,-r*0.22,r*0.05,0,Math.PI*2);ctx.fill();
ctx.fillStyle=c;ctx.globalAlpha=0.7;
ctx.beginPath();ctx.moveTo(0,r*0.3);ctx.quadraticCurveTo(r*0.3,r*0.8,r*0.5,r*0.3);ctx.fill();
ctx.globalAlpha=1;
if(isPlayer){
ctx.rotate(-ang);
ctx.fillStyle='#ffd700';
ctx.font='bold '+(r*0.35)+'px Arial';
ctx.textAlign='center';
ctx.fillText(lv,0,0);
}
ctx.restore();
}

function drawBg(){
const g=ctx.createLinearGradient(0,0,0,H);
g.addColorStop(0,'#0a3b5e');g.addColorStop(0.5,'#1a659f');g.addColorStop(1,'#0a4a6e');
ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
ctx.fillStyle='rgba(255,255,255,0.03)';
for(let i=0;i<5;i++){
const x=i*W/4+Math.sin(Date.now()/1000+i)*30;
ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x+60,H);ctx.lineTo(x-20,H);ctx.fill();
}
}

function loop(){
if(!run)return;requestAnimationFrame(loop);

if(joy.active&&(joy.dx||joy.dy)){
P.ang=Math.atan2(joy.dy,joy.dx);
P.x+=Math.cos(P.ang)*P.spd;
P.y+=Math.sin(P.ang)*P.spd;
}

camX+=(P.x-W/2-camX)*0.08;
camY+=(P.y-H/2-camY)*0.08;

drawBg();

for(let m of mobs){
m.x+=Math.cos(m.ang)*m.spd;
m.y+=Math.sin(m.ang)*m.spd;
if(Math.random()<0.02)m.ang+=(Math.random()-0.5);
const mx=m.x-camX,my=m.y-camY;
drawFish(mx,my,m.r,m.c,m.ang,false);
}

drawFish(P.x-camX,P.y-camY,P.r,'#feca57',P.ang,true);
}

document.getElementById('start').addEventListener('click',()=>{
document.getElementById('menu').style.display='none';
init();run=true;loop();
});
</script>
</body>
</html>
