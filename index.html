// ============ AUDIO SYSTEM ============
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
function sfx(type){if(!audioCtx||isMuted)return;try{const t=audioCtx.currentTime,o=audioCtx.createOscillator(),g=audioCtx.createGain();
if(type==='bite'){o.type='square';o.frequency.setValueAtTime(200,t);o.frequency.exponentialRampToValueAtTime(100,t+.08);g.gain.setValueAtTime(.15,t);g.gain.exponentialRampToValueAtTime(.001,t+.1)}
else if(type==='hit'){o.type='sawtooth';o.frequency.setValueAtTime(150,t);o.frequency.exponentialRampToValueAtTime(80,t+.12);g.gain.setValueAtTime(.12,t);g.gain.exponentialRampToValueAtTime(.001,t+.15)}
else if(type==='eat'){o.type='sine';o.frequency.setValueAtTime(400,t);o.frequency.exponentialRampToValueAtTime(700,t+.1);g.gain.setValueAtTime(.1,t);g.gain.exponentialRampToValueAtTime(.001,t+.12)}
else if(type==='evolve'){[523,659,784,1046].forEach((f,i)=>{const o2=audioCtx.createOscillator(),g2=audioCtx.createGain();o2.type='sine';o2.frequency.value=f;g2.gain.setValueAtTime(.1,t+i*.08);g2.gain.exponentialRampToValueAtTime(.001,t+i*.08+.15);o2.connect(g2);g2.connect(audioCtx.destination);o2.start(t+i*.08);o2.stop(t+i*.08+.15)})}
else if(type==='dash'){o.type='triangle';o.frequency.setValueAtTime(300,t);o.frequency.exponentialRampToValueAtTime(900,t+.15);g.gain.setValueAtTime(.12,t);g.gain.exponentialRampToValueAtTime(.001,t+.2)}
else if(type==='boss'){o.type='sawtooth';o.frequency.setValueAtTime(100,t);o.frequency.linearRampToValueAtTime(60,t+.4);g.gain.setValueAtTime(.1,t);g.gain.exponentialRampToValueAtTime(.001,t+.5)}
o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(t+.6)}catch(e){}}

let musicTime=0;
function playAmbient(dt){if(!audioCtx||isMuted)return;musicTime+=dt;if(musicTime<0.5)return;musicTime=0;try{const t=audioCtx.currentTime,o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sine';o.frequency.value=80+Math.random()*40;g.gain.setValueAtTime(0.03,t);g.gain.exponentialRampToValueAtTime(0.001,t+2);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(t+2)}catch(e){}}

bgFish=[];for(let i=0;i<100;i++)bgFish.push({x:Math.random()*CW,y:Math.random()*CH,size:1+Math.random()*3,color:'rgba(255,255,255,'+(.03+Math.random()*.1)+')',spd:0.2+Math.random()*0.5,ang:Math.random()*Math.PI*2});
bubbles=[];for(let i=0;i<50;i++)bubbles.push({x:Math.random()*W,y:H+Math.random()*300,r:2+Math.random()*8,spd:1+Math.random()*3,a:0.05+Math.random()*0.15});

P={x:CW/2,y:CH/2,r:e.r,lv:0,xp:0,hp:e.hp,maxHp:e.hp,spd:e.spd,ang:0,bite:e.bite,hide:0,shield:0,dash:0,biting:false,jaw:0,bitet:0,inv:0};
camX=P.x-W/2;camY=P.y-H/2;mobs=[];nets=[];parts=[];boss=null;eaten=0;score=0;curLvl=0;revives=1;gameTime=0;spawnTimer=0;updateHUD()
}

// ============ CONTROLS ============
const joyEl=document.getElementById('joy'),joyKnob=document.getElementById('jk');
// Floating joystick - appears where you touch
let joyTouchId=null;
canvas.addEventListener('touchstart',e=>{if(!run)return;e.preventDefault();initAudio();const t=e.changedTouches[0];joyTouchId=t.identifier;joy.cx=t.clientX;joy.cy=t.clientY;joy.active=true;joyEl.style.display='block';joyEl.style.left=(t.clientX-55)+'px';joyEl.style.top=(t.clientY-55)+'px';joyKnob.style.left='32px';joyKnob.style.top='32px';updJoy(t.clientX,t.clientY)},false);
canvas.addEventListener('touchmove',e=>{e.preventDefault();if(!joy.active)return;for(let t of e.changedTouches){if(t.identifier===joyTouchId){updJoy(t.clientX,t.clientY)}}},false);
canvas.addEventListener('touchend',e=>{e.preventDefault();for(let t of e.changedTouches){if(t.identifier===joyTouchId){joy.active=false;joy.dx=0;joy.dy=0;joyTouchId=null;joyEl.style.display='none';break}}},false);
function updJoy(x,y){let dx=x-joy.cx,dy=y-joy.cy,d=Math.hypot(dx,dy);const max=38;if(d>max){dx=dx/d*max;dy=dy/d*max}joyKnob.style.left=(32+dx)+'px';joyKnob.style.top=(32+dy)+'px';joy.dx=dx/max;joy.dy=dy/max}

function biteDown(e){if(e)e.preventDefault();if(!run)return;initAudio();P.biting=true;P.bitet=15;P.jaw=1;sfx('bite');const br=P.r*2.5,ba=0.7;let hit=false;
// Bite ring effect
const ring=document.getElementById('bite-ring');ring.style.left=(P.x-camX-br)+'px';ring.style.top=(P.y-camY-br)+'px';ring.style.width=(br*2)+'px';ring.style.height=(br*2)+'px';ring.style.opacity=1;ring.style.transition='none';setTimeout(()=>{ring.style.transition='all 0.3s ease-out';ring.style.opacity=0;ring.style.transform='scale(1.3)'},10);
for(let i=mobs.length-1;i>=0;i--){const m=mobs[i],dist=Math.hypot(m.x-P.x,m.y-P.y),ang=Math.atan2(m.y-P.y,m.x-P.x),diff=Math.abs(ang-P.ang);while(diff>Math.PI)diff-=Math.PI*2;if(dist<br&&Math.abs(diff)<ba){hit=true;let dmg=P.bite;if(P.dash>0)dmg+=8;if(P.lv>m.lv)dmg*=1.2;m.hp-=dmg;shake=5;float(m.x,m.y,'-'+dmg,'#ff6b6b');for(let k=0;k<4;k++)parts.push({x:m.x,y:m.y,vx:(Math.random()-.5)*6,vy:(Math.random()-.5)*6,r:3,life:18,c:'#ff6b6b'});if(m.hp<=0){eatMob(m,i)}}}
if(boss){const dist=Math.hypot(boss.x-P.x,boss.y-P.y),ang=Math.atan2(boss.y-P.y,boss.x-P.x),diff=Math.abs(ang-P.ang);if(dist<br&&diff<ba){hit=true;let dmg=P.bite+(P.dash>0?10:0);boss.hp-=dmg;shake=8;float(boss.x,boss.y,'-'+dmg,'#ff0000',18);for(let k=0;k<6;k++)parts.push({x:boss.x,y:boss.y,vx:(Math.random()-.5)*7,vy:(Math.random()-.5)*7,r:4,life:25,c:'#ff0000'});if(boss.hp<=0)killBoss()}}
}
function biteUp(){P.biting=false;P.jaw=0}

function eatMob(m,idx){sfx('eat');score+=m.r*4;P.xp+=m.xp;eaten++;combo++;float(m.x,m.y,'+'+m.xp+' XP','#feca57');for(let k=0;k<10;k++)parts.push({x:m.x,y:m.y,vx:(Math.random()-.5)*5,vy:(Math.random()-.5)*5,r:2+Math.random()*3,life:20,c:m.c});mobs.splice(idx,1);if(combo>1){const el=document.getElementById('combo');el.textContent=combo+'连击!';el.style.opacity=1;clearTimeout(el._t);el._t=setTimeout(()=>el.style.opacity=0,600)}checkEvo();updateHUD()}

function killBoss(){sfx('evolve');for(let k=0;k<40;k++)parts.push({x:boss.x,y:boss.y,vx:(Math.random()-.5)*10,vy:(Math.random()-.5)*10,r:4+Math.random()*4,life:50,c:'#ffd700'});score+=1000;coins+=100;localStorage.setItem('fc_coins',coins);float(boss.x,boss.y,'BOSS击杀! +1000','#ffd700',24);boss=null;curLvl++;if(curLvl>=levels.length){document.getElementById('fsc').textContent=score;document.getElementById('victory').style.display='flex';run=false;stopMusic()}else{setTimeout(initLevel,1000)}updateHUD()}

function float(x,y,txt,c,sz=14){const el=document.createElement('div');el.className='ft';el.style.color=c;el.style.fontSize=sz+'px';el.style.left=(x-camX)+'px';el.style.top=(y-camY-25)+'px';el.textContent=txt;document.body.appendChild(el);setTimeout(()=>el.remove(),800)}

function checkEvo(){const nx=evo[P.lv+1];if(!nx)return;if(P.xp>=nx.xp){P.lv++;P.r=nx.r;P.spd=nx.spd;P.maxHp=nx.hp;P.hp=nx.hp;P.bite=nx.bite;coins+=50;localStorage.setItem('fc_coins',coins);sfx('evolve');for(let k=0;k<30;k++)parts.push({x:P.x,y:P.y,vx:(Math.random()-.5)*8,vy:(Math.random()-.5)*8,r:4,life:40,c:'#ffd700'});document.getElementById('eic').textContent=nx.icon;document.getElementById('ena').textContent=evo[P.lv-1].n+' → '+nx.n;document.getElementById('eab').textContent=nx.ab;document.getElementById('evo').style.display='flex';run=false;updateHUD()}}

function initLevel(){mobs=[];boss=null;const l=levels[curLvl];document.getElementById('hob').textContent=l.name+' | 吃鱼 '+eaten+'/'+l.need;for(let i=0;i<30;i++)spawnMobNearPlayer();sfx('evolve')}
function spawnMobNearPlayer(){const l=levels[curLvl],pool=l.fish,types=mTypes.slice(0,Math.min(pool+5,18)),mt=types[Math.floor(Math.random()*types.length)];const angle=Math.random()*Math.PI*2,dist=100+Math.random()*400;let x=P.x+Math.cos(angle)*dist,y=P.y+Math.sin(angle)*dist;mobs.push({x,y,n:mt.n,r:mt.r,hp:mt.hp,maxHp:mt.hp,c:mt.c,spd:mt.spd,xp:mt.xp,agro:mt.agro,dmg:mt.dmg||0,ang:Math.random()*Math.PI*2,phase:Math.random()*100,lvl:Math.floor(Math.random()*3)})}

function spawnMob(){if(mobs.length>60)return;const l=levels[curLvl],pool=l.fish,types=mTypes.slice(0,Math.min(pool+5,18)),mt=types[Math.floor(Math.random()*types.length)];let x,y,side=Math.floor(Math.random()*4);if(side===0){x=camX-50;y=camY+Math.random()*H}else if(side===1){x=camX+W+50;y=camY+Math.random()*H}else if(side===2){x=camX+Math.random()*W;y=camY-50}else{x=camX+Math.random()*W;y=camY+H+50}x=Math.max(10,Math.min(CW-10,x));y=Math.max(10,Math.min(CH-10,y));mobs.push({x,y,n:mt.n,r:mt.r,hp:mt.hp,maxHp:mt.hp,c:mt.c,spd:mt.spd,xp:mt.xp,agro:mt.agro,dmg:mt.dmg||0,ang:Math.random()*Math.PI*2,phase:Math.random()*100,lvl:Math.floor(Math.random()*3)})}

function trySpawnBoss(){const l=levels[curLvl];if(!boss&&eaten>=l.need){let sx,sy;if(Math.random()<0.5){sx=Math.random()<0.5?camX-200:camX+W+200;sy=camY+Math.random()*H}else{sx=camX+Math.random()*W;sy=Math.random()<0.5?camY-200:camY+H+200}boss={x:sx,y:sy,r:l.bossR,hp:l.bossHp,maxHp:l.bossHp,c:l.c,spd:2,ang:0,phase:0,name:l.bn};sfx('boss');for(let k=0;k<3;k++)setTimeout(()=>float(camX+W/2,camY+H/2-80,'⚠️ BOSS出现!','#ff0000',22),k*400)}}

function uskill(s){if(!run)return;initAudio();const now=Date.now();
if(s==='dash'&&now>CD.dash){CD.dash=now+8000;P.dash=50;sfx('dash');for(let k=0;k<15;k++)parts.push({x:P.x,y:P.y,vx:(Math.random()-.5)*4,vy:(Math.random()-.5)*4,r:4,life:25,c:'#48dbfb'})}
if(s==='hide'&&now>CD.hide){CD.hide=now+15000;P.hide=300}
if(s==='shield'&&now>CD.shield){CD.shield=now+12000;P.shield=300}
if(s==='net'&&now>CD.net){CD.net=now+10000;sfx('dash');nets.push({x:P.x+Math.cos(P.ang)*P.r,y:P.y+Math.sin(P.ang)*P.r,vx:Math.cos(P.ang)*12,vy:Math.sin(P.ang)*12,r:40,life:60});for(let k=0;k<8;k++)parts.push({x:P.x+P.r*Math.cos(P.ang+k),y:P.y+P.r*Math.sin(P.ang+k),vx:(Math.random()-.5)*3,vy:(Math.random()-.5)*3,r:3,life:20,c:'#feca57'})}
updateSkills()}

function updateSkills(){const now=Date.now();
['dash','hide','shield','net'].forEach((s,i)=>{const el=document.getElementById(['sd','sh','ss','sn'][i]),cd=Math.max(0,Math.ceil((CD[s]-now)/1000));if(cd>0){el.classList.remove('ok');let ov=el.querySelector('.scd');if(!ov){ov=document.createElement('div');ov.className='scd';el.appendChild(ov)}ov.textContent=cd}else{el.classList.add('ok');let ov=el.querySelector('.scd');if(ov)ov.remove()}})}

// ============ GAME LOOP ============
let lastT=0;
function loop(ts){if(!run)return;const dt=Math.min((ts-lastT)/1000,0.1);lastT=ts;gameTime+=dt;tick++;playAmbient(dt);updateSkills();
// Player movement
let dx=0,dy=0;
if(joy.active&&joy.dx!==0){dx=joy.dx;dy=joy.dy;P.ang=Math.atan2(dy,dx)}
let spd=P.spd;if(P.dash>0){spd*=3;P.dash--;if(tick%2===0)parts.push({x:P.y,y:P.y,vx:(Math.random()-.5)*3,vy:(Math.random()-.5)*3,r:3,life:15,c:'#48dbfb'})}
if(dx!==0||dy!==0){P.x+=dx*spd*60*dt;P.y+=dy*spd*60*dt}
P.x=Math.max(P.r,Math.min(CW-P.r,P.x));P.y=Math.max(P.r,Math.min(CH-P.r,P.y));
if(P.hide>0)P.hide--;if(P.shield>0)P.shield--;if(P.jaw>0)P.jaw=Math.max(0,P.jaw-0.1);if(P.inv>0)P.inv--;if(shake>0)shake-=dt*30;if(shake<0)shake=0;
// Camera
let tx=P.x-W/2,ty=P.y-H/2;if(shake>0){tx+=(Math.random()-.5)*shake;ty+=(Math.random()-.5)*shake}camX+=(tx-camX)*0.1;camY+=(ty-camY)*0.1;camX=Math.max(0,Math.min(CW-W,camX));camY=Math.max(0,Math.min(CH-H,camY));
// Spawning
spawnTimer+=dt;if(spawnTimer>0.3){spawnTimer=0;spawnMob();if(tick%120===0)trySpawnBoss()}
// Nets
for(let i=nets.length-1;i>=0;i--){const n=nets[i];n.x+=n.vx;n.y+=n.vy;n.life-=60*dt;if(n.life<=0){nets.splice(i,1);continue}for(let j=mobs.length-1;j>=0;j--){const m=mobs[j];if(Math.hypot(n.x-m.x,n.y-m.y)<n.r+m.r){m.hp-=20;shake=3;float(m.x,m.y,'-20','#ff6b6b');if(m.hp<=0)eatMob(m,j);nets.splice(i,1);break}}}
// Mobs AI
for(let i=mobs.length-1;i>=0;i--){const m=mobs[i];const dToP=Math.hypot(P.x-m.x,P.y-m.y);
if(m.agro&&dToP<300&&m.r>P.r*0.9)m.ang=Math.atan2(P.y-m.y,P.x-m.x);
else if(m.r<P.r*0.8&&dToP<200)m.ang=Math.atan2(m.y-P.y,m.x-P.x)+Math.PI;
else if(tick%30===0)m.ang+=(Math.random()-.5)*0.5;
m.x+=Math.cos(m.ang)*m.spd;m.y+=Math.sin(m.ang)*m.spd;m.phase+=dt;
if(m.x<camX-150||m.x>camX+W+150||m.y<camY-150||m.y>camY+H+150){mobs.splice(i,1);continue}
if(dToP<P.r+m.r*0.5&&P.inv<=0){if(P.shield>0){m.hp-=30;shake=5;float(m.x,m.y,'反弹!','#ff9ff3')}else{P.hp-=m.dmg||10;P.inv=30;shake=10;sfx('hit');for(let k=0;k<5;k++)parts.push({x:P.x,y:P.y,vx:(Math.random()-.5)*5,vy:(Math.random()-.5)*5,r:3,life:20,c:'#ff6b6b'})}if(P.hp<=0){die();return}}}
// Boss
if(boss){const dToP=Math.hypot(P.x-boss.x,P.y-boss.y);boss.ang=Math.atan2(P.y-boss.y,P.x-boss.x);if(dToP>boss.r)boss.x+=Math.cos(boss.ang)*boss.spd*0.5;boss.y+=Math.sin(boss.ang)*boss.spd*0.5;boss.phase+=dt;
if(dToP<P.r+boss.r*0.6&&P.inv<=0){if(P.shield>0){boss.hp-=20;float(boss.x,boss.y,'-20','#ff9ff3')}else{P.hp-=30;P.inv=40;shake=15;sfx('hit')}if(P.hp<=0){die();return}}}
// Particles
for(let i=parts.length-1;i>=0;i--){const p=parts[i];p.x+=p.vx;p.y+=p.vy;p.vx*=0.95;p.vy*=0.95;p.life-=60*dt;if(p.life<=0)parts.splice(i,1)}
// Bubbles
for(let b of bubbles){b.y-=b.spd;if(b.y<camY-50){b.y=camY+H+50;b.x=camX+Math.random()*W}}
draw();updateHUD();requestAnimationFrame(loop)}

// ============ RENDER ============
function draw(){const lvl=levels[curLvl];const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,lvl.bg);g.addColorStop(0.5,lvl.bg2);g.addColorStop(1,lvl.bg);ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
// Light rays
ctx.save();ctx.globalAlpha=0.03;for(let i=0;i<5;i++){ctx.fillStyle='#fff';ctx.beginPath();const lx=i*W/5+Math.sin(tick*0.002+i)*30;ctx.moveTo(lx,0);ctx.lineTo(lx+40+Math.sin(tick*0.003+i)*20,H);ctx.lineTo(lx-20,H);ctx.fill()}ctx.restore();
// Decorations
for(let d of decors){const dx=d.x-camX,dy=d.y-camY;if(dx<-100||dx>W+100||dy<-100||dy>H+100)continue;ctx.save();ctx.translate(dx,dy);ctx.scale(d.scale,d.scale);
if(d.type==='coral'){ctx.fillStyle=d.color;ctx.beginPath();ctx.moveTo(0,0);ctx.quadraticCurveTo(10,-20,5,-40);ctx.quadraticCurveTo(0,-30,-5,-40);ctx.quadraticCurveTo(-10,-20,0,0);ctx.fill()}
else if(d.type==='seaweed'){ctx.strokeStyle=d.color;ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(0,0);const sway=Math.sin(tick*0.02+d.phase)*10;ctx.quadraticCurveTo(sway,-20,sway*0.5,-40);ctx.stroke()}
else if(d.type==='rock'){ctx.fillStyle='#555';ctx.beginPath();ctx.arc(0,-10,15,0,Math.PI*2);ctx.fill()}
else if(d.type==='shell'){ctx.fillStyle=d.color;ctx.beginPath();ctx.ellipse(0,0,8,5,Math.sin(tick*0.01+d.phase)*0.3,0,Math.PI*2);ctx.fill()}
else if(d.type==='starfish'){ctx.fillStyle=d.color;for(let a=0;a<5;a++){const aa=Math.PI*2/5*a-Math.PI/2;ctx.beginPath();ctx.ellipse(Math.cos(aa)*6,Math.sin(aa)*6,3,8,aa,0,Math.PI*2);ctx.fill()}}
else if(d.type==='anemone'){ctx.strokeStyle=d.color;ctx.lineWidth=2;for(let a=0;a<6;a++){const aa=Math.PI*2/6*a;const len=15+Math.sin(tick*0.03+d.phase+a)*5;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(aa)*len,Math.sin(aa)*len);ctx.stroke()}}
else if(d.type==='treasure'){ctx.fillStyle='#d4af37';ctx.fillRect(-15,-10,30,20);ctx.fillStyle='#8b6914';ctx.fillRect(-12,-15,24,5)}
ctx.restore()}
// Background fish
for(let f of bgFish){f.x+=Math.cos(f.ang)*f.spd;f.y+=Math.sin(f.ang)*f.spd;const fx=f.x-camX,fy=f.y-camY;if(fx<-50||fx>W+50||fy<-50||fy>H+50){f.x=camX+Math.random()*W;f.y=camY+Math.random()*H;f.ang=Math.random()*Math.PI*2}ctx.fillStyle=f.color;ctx.beginPath();ctx.arc(fx,fy,f.size,0,Math.PI*2);ctx.fill()}
// Bubbles
for(let b of bubbles){const bx=b.x-camX,by=b.y-camY;if(bx>-50&&bx<W+50&&by>-50&&by<H+50){ctx.strokeStyle='rgba(255,255,255,'+b.a+')';ctx.lineWidth=1;ctx.beginPath();ctx.arc(bx,by,b.r,0,Math.PI*2);ctx.stroke();ctx.fillStyle='rgba(255,255,255,'+(b.a*0.3)+')';ctx.fill()}}
// Mobs
for(let m of mobs)drawMob(m);
// Nets
for(let n of nets){ctx.save();ctx.strokeStyle='#feca57';ctx.lineWidth=2;ctx.setLineDash([4,4]);ctx.beginPath();ctx.arc(n.x-camX,n.y-camY,n.r,0,Math.PI*2);ctx.stroke();ctx.restore()}
// Boss
if(boss)drawBoss();
// Player
drawPlayer();
// HP bars above mobs
for(let m of mobs){if(m.hp<m.maxHp){const pct=m.hp/m.maxHp;ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(m.x-camX-18,m.y-camY-m.r-12,36,6);ctx.fillStyle=pct>0.5?'#2ecc71':pct>0.25?'#f39c12':'#e74c3c';ctx.fillRect(m.x-camX-18,m.y-camY-m.r-12,36*pct,6)}}
// Boss HP bar
if(boss){ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(W/2-100,20,200,12);ctx.fillStyle='#e74c3c';ctx.fillRect(W/2-100,20,200*(boss.hp/boss.maxHp),12);ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.strokeRect(W/2-100,20,200,12);ctx.fillStyle='#fff';ctx.font='bold 12px sans-serif';ctx.textAlign='center';ctx.fillText(boss.name+' HP',W/2,14);ctx.textAlign='left'}
// Particles
for(let p of parts){ctx.globalAlpha=Math.max(0,p.life/30);ctx.fillStyle=p.c;ctx.beginPath();ctx.arc(p.x-camX,p.y-camY,p.r,0,Math.PI*2);ctx.fill()}ctx.globalAlpha=1}

function drawCute(o,sx,sy,isPlayer,isBoss){
const px=sx+(shake>0?(Math.random()-.5)*shake:0),py=sy+(shake>0?(Math.random()-.5)*shake:0);
ctx.save();ctx.translate(px,py);ctx.rotate(o.ang||0);
if(o.hide>0)ctx.globalAlpha=0.25;if(o.inv>0&&tick%6<3)ctx.globalAlpha=0.5;
if(o.shield>0||isPlayer&&P.shield>0){ctx.strokeStyle='rgba(255,159,243,0.5)';ctx.lineWidth=3;ctx.beginPath();ctx.arc(0,0,(o.r||14)*1.6,0,Math.PI*2);ctx.stroke()}
const r=o.r||14,c=o.c||'#74b9ff',tw=Math.sin((o.phase||0)*3)*(r*0.1);
ctx.shadowColor=c;ctx.shadowBlur=isBoss?30:15;
// Tail
ctx.fillStyle=c;ctx.globalAlpha=(o.hide>0?0.25:1)*0.85;ctx.beginPath();ctx.moveTo(-r*0.5,0);ctx.bezierCurveTo(-r,-r*0.4+tw,-r*1.2,-r*0.3+tw,-r*1.4,-r*0.55+tw);ctx.bezierCurveTo(-r,-tw*0.3,-r*1.2,r*0.1+tw,-r*1.4,r*0.55+tw);ctx.bezierCurveTo(-r*1.2,r*0.3+tw,-r,r*0.4+tw,-r*0.5,0);ctx.fill();
// Body
ctx.globalAlpha=o.hide>0?0.25:1;const grad=ctx.createRadialGradient(r*0.1,-r*0.1,0,0,0,r);grad.addColorStop(0,lighten(c,40));grad.addColorStop(0.7,c);grad.addColorStop(1,darken(c,30));ctx.fillStyle=grad;ctx.beginPath();ctx.ellipse(0,0,r*0.95,r*0.78,0,0,Math.PI*2);ctx.fill();
// Shine
ctx.fillStyle='rgba(255,255,255,0.35)';ctx.beginPath();ctx.ellipse(r*0.15,-r*0.2,r*0.4,r*0.25,-0.2,0,Math.PI*2);ctx.fill();
// Fin
ctx.fillStyle=c;ctx.globalAlpha=(o.hide>0?0.25:1)*0.6;ctx.beginPath();const foff=Math.sin((o.phase||0)*3)*r*0.1;ctx.moveTo(-r*0.15,r*0.4);ctx.quadraticCurveTo(r*0.2+foff,r*0.95,r*0.5,r*0.45);ctx.fill();ctx.globalAlpha=o.hide>0?0.25:1;
// Dorsal fin (top)
ctx.fillStyle=darken(c,20);ctx.globalAlpha=(o.hide>0?0.25:1)*0.5;ctx.beginPath();ctx.moveTo(-r*0.2,-r*0.5);ctx.quadraticCurveTo(0,-r*0.9+foff*0.5,r*0.2,-r*0.5);ctx.fill();ctx.globalAlpha=o.hide>0?0.25:1;
// Eye (big Q-style)
const eR=r*0.2,eX=r*0.4,eY=-r*0.1;
ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(eX,eY,eR,0,Math.PI*2);ctx.fill();
ctx.shadowBlur=0;
const eR2=eR*0.65;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(eX-eR*0.2,eY+eR*0.1,eR2,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#222';ctx.beginPath();ctx.arc(eX+eR*0.12,eY+eR*0.05,eR*0.42,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(eX+eR*0.22,eY-eR*0.15,eR*0.18,0,Math.PI*2);ctx.fill();
// Blush
ctx.fillStyle='rgba(255,150,150,0.3)';ctx.beginPath();ctx.ellipse(r*0.2,r*0.22,r*0.12,r*0.07,0,0,Math.PI*2);ctx.fill();
// Mouth
if(isPlayer&&P.jaw>0){ctx.fillStyle='rgba(255,80,80,'+P.jaw*0.6+')';ctx.beginPath();ctx.ellipse(r*0.7,r*0.05,r*0.2,r*0.12,0,0,Math.PI*2);ctx.fill()}else{ctx.strokeStyle=darken(c,40);ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(r*0.55,r*0.08,r*0.08,0.1,Math.PI-0.1);ctx.stroke()}
// Level indicator for player
if(isPlayer&&P.lv>0){ctx.fillStyle='#ffd700';ctx.font='bold '+(r*0.4)+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(P.lv+1,0,0)}
if(isBoss){ctx.strokeStyle='rgba(255,215,0,0.3)';ctx.lineWidth=2;ctx.setLineDash([6,6]);ctx.beginPath();ctx.arc(0,0,r*1.15,0,Math.PI*2);ctx.stroke();ctx.setLineDash([])}
ctx.restore()}

function drawMob(m){const sx=m.x-camX,sy=m.y-camY;if(sx<-100||sx>W+100||sy<-100||sy>H+100)return;drawCute(m,sx,sy,false,false);ctx.fillStyle=m.agro&&m.r>P.r*0.9?'#ff6b6b':'rgba(255,255,255,.5)';ctx.font='bold 10px sans-serif';ctx.textAlign='center';ctx.fillText(m.n,sx,sy-m.r-16);ctx.textAlign='left'}
function drawBoss(){const sx=boss.x-camX,sy=boss.y-camY;drawCute(boss,sx,sy,false,true);ctx.fillStyle='#ff0000';ctx.font='bold 14px sans-serif';ctx.textAlign='center';ctx.fillText(boss.name,sx,sy-boss.r-20);ctx.textAlign='left'}
function drawPlayer(){drawCute(P,P.x-camX,P.y-camY,true,false)}
function lighten(hex,pct){const n=parseInt(hex.slice(1),16);return '#'+(Math.min(255,(n>>16)+pct)<<16|Math.min(255,((n>>8)&0xff)+pct)<<8|Math.min(255,(n&0xff)+pct)).toString(16).padStart(6,'0')}
function darken(hex,pct){const n=parseInt(hex.slice(1),16);return '#'+(Math.max(0,(n>>16)-pct)<<16|Math.max(0,((n>>8)&0xff)-pct)<<8|Math.max(0,(n&0xff)-pct)).toString(16).padStart(6,'0')}

// ============ UI FUNCTIONS ============
function updateHUD(){document.getElementById('hsc').textContent=score;document.getElementById('hlv').textContent=P.lv+1;document.getElementById('hst').textContent=evo[P.lv].n;document.getElementById('hcn').textContent=coins;const cur=evo[P.lv].xp,nx=evo[P.lv+1];document.getElementById('hxp').style.width=nx?Math.max(0,Math.min(100,(P.xp-cur)/(nx.xp-cur)*100))+'%':'100%';document.getElementById('hhp').style.width=Math.max(0,P.hp/P.maxHp*100)+'%';if(boss){const l=levels[curLvl];document.getElementById('hob').textContent=l.name+' | BOSS: '+boss.name}else{const l=levels[curLvl];document.getElementById('hob').textContent=l.name+' | 吃鱼 '+eaten+'/'+l.need}}

function smode(m){mode=m;document.querySelectorAll('.mb').forEach(b=>b.classList.remove('sel'));document.getElementById({'solo':'ms','match':'mm','host':'mh','join':'mj'}[m]).classList.add('sel');document.getElementById('rbox').style.display=m==='host'||m==='join'||m==='match'?'block':'none';document.getElementById('rhu').style.display=m==='host'?'block':'none';document.getElementById('rju').style.display=m==='join'?'block':'none';document.getElementById('rmu').style.display=m==='match'?'block':'none';if(m==='host'){roomId=genCode();document.getElementById('rcode').textContent=roomId;initPeer(true)}else if(m==='match'){document.getElementById('waiting').style.display='flex';startMatch()}}
function genCode(){return Math.random().toString(36).substr(2,3).toUpperCase()+Math.random().toString(36).substr(2,3).toUpperCase()}
function toggleFS(){const d=document;if(d.fullscreenElement){d.exitFullscreen()}else{d.documentElement.requestFullscreen()}}

// ============ PEERJS MULTIPLAYER ============
function initPeer(host){if(peer)return;peer=new Peer(host?roomId:null,{host:'peerjs.com',port:443,secure:true});
peer.on('open',id=>{if(!host)roomId=id;console.log('Peer ID:',id)});
peer.on('connection',c=>{conn=c;setupConn();if(isHost)startGame()});
peer.on('error',e=>{console.error(e);alert('连接错误: '+e)})}
function joinR(){const code=document.getElementById('ci').value.toUpperCase();if(code.length!==6){alert('请输入6位房间码');return}roomId=code;initPeer(false);conn=peer.connect(roomId);setupConn()}
function setupConn(){conn.on('open',()=>{console.log('Connected!');document.getElementById('waiting').style.display='none';if(!isHost)startGame()});conn.on('data',d=>{console.log('Received:',d)});conn.on('close',()=>{console.log('Disconnected')})}
function startMatch(){setTimeout(()=>{document.getElementById('waiting').style.display='none';startGame()},2000)}
function cancelM(){document.getElementById('waiting').style.display='none';document.getElementById('menu').style.display='flex'}

function wxShare(){const url='https://houlaine00.github.io/fish-game/?room='+roomId;const txt='来和我一起深海大冒险!房间码:'+roomId;if(navigator.share){navigator.share({title:'深海霸主Pro',text:txt,url:url})}else{alert('复制分享内容: '+txt+' '+url)}}
function cpLink(){const url='https://houlaine00.github.io/fish-game/?room='+roomId;navigator.clipboard.writeText(url).then(()=>alert('链接已复制!'))}

// ============ GAME STATE ============
function startGame(){initGame();startMusic();toggleFS();initLevel();document.getElementById('menu').style.display='none';document.getElementById('hud').style.display='flex';document.getElementById('hud').style.flexDirection='row';document.getElementById('hob').style.display='block';document.getElementById('ctrl').style.display='block';lastT=performance.now();run=true;requestAnimationFrame(loop)}
function clEvo(){document.getElementById('evo').style.display='none';run=true;lastT=performance.now();requestAnimationFrame(loop)}
function die(){sfx('hit');document.getElementById('osc').textContent=score;document.getElementById('over').style.display='flex';run=false}
function revive(){if(revives<=0)return;revives--;coins-=20;localStorage.setItem('fc_coins',coins);const e=evo[P.lv];P.hp=e.hp*0.5;document.getElementById('over').style.display='none';run=true;lastT=performance.now();requestAnimationFrame(loop)}
function backMenu(){run=false;document.getElementById('over').style.display='none';document.getElementById('victory').style.display='none';document.getElementById('evo').style.display='none';document.getElementById('hud').style.display='none';document.getElementById('hob').style.display='none';document.getElementById('ctrl').style.display='none';document.getElementById('menu').style.display='flex'}
function stopMusic(){isMuted=true}

// Init
document.addEventListener('DOMContentLoaded',()=>{document.getElementById('hcn').textContent=coins});
</script>
</body>
</html>
